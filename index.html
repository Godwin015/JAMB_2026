    if(checkboxes.length !== 4) return alert("You must select exactly 4 subjects!");

    selectedSubjects = Array.from(checkboxes).map(cb => cb.value);
    document.getElementById('disp-reg').innerText = reg;
    document.getElementById('start-screen').classList.remove('active');
    document.getElementById('exam-screen').classList.add('active');
    
    startSubject();
}

function startSubject() {
    const subName = selectedSubjects[currentSubjectIdx];
    document.getElementById('current-subject-name').innerText = subName.toUpperCase();
    currentQIdx = 0;
    loadQuestion();
}

function loadQuestion() {
    const subName = selectedSubjects[currentSubjectIdx];
    const qData = masterBank[subName].questions[currentQIdx];
    
    document.getElementById('q-progress').innerText = `Q ${currentQIdx + 1} / ${masterBank[subName].questions.length}`;
    document.getElementById('q-body').innerText = qData.q;
    
    const optCont = document.getElementById('opt-container');
    optCont.innerHTML = "";
    
    ['a','b','c','d'].forEach(letter => {
        const div = document.createElement('div');
        div.className = `opt ${userAnswers[subName]?.[currentQIdx] === letter ? 'picked' : ''}`;
        div.innerText = `${letter.toUpperCase()}. ${qData[letter]}`;
        div.onclick = () => {
            if(!userAnswers[subName]) userAnswers[subName] = {};
            userAnswers[subName][currentQIdx] = letter;
            loadQuestion();
        };
        optCont.appendChild(div);
    });

    // Update Button Text
    const nextBtn = document.getElementById('next-btn');
    if (currentQIdx === masterBank[subName].questions.length - 1) {
        nextBtn.innerText = currentSubjectIdx === 3 ? "FINISH ALL" : "NEXT SUBJECT";
    } else {
        nextBtn.innerText = "NEXT";
    }
}

function nextQ() {
    const subName = selectedSubjects[currentSubjectIdx];
    if (currentQIdx < masterBank[subName].questions.length - 1) {
        currentQIdx++;
        loadQuestion();
    } else {
        // Move to next subject or finish
        if (currentSubjectIdx < 3) {
            currentSubjectIdx++;
            startSubject();
        } else {
            showFinalResult();
        }
    }
}

function prevQ() {
    if (currentQIdx > 0) {
        currentQIdx--;
        loadQuestion();
    }
}

function showFinalResult() {
    document.getElementById('exam-screen').classList.remove('active');
    document.getElementById('result-screen').classList.add('active');
    document.getElementById('res-reg').innerText = document.getElementById('reg-no').value;
    
    let totalScore = 0;
    const scoreSummary = document.getElementById('individual-scores');
    scoreSummary.innerHTML = "";

    selectedSubjects.forEach(sub => {
        let subScore = 0;
        const bank = masterBank[sub];
        bank.questions.forEach((q, i) => {
            if(userAnswers[sub]?.[i] === q.ans) subScore += bank.marks;
        });
        totalScore += subScore;
        scoreSummary.innerHTML += `<p><strong>${sub}:</strong> ${subScore.toFixed(1)}</p>`;
    });

    document.getElementById('total-agg').innerText = totalScore.toFixed(0);
}
</script>
